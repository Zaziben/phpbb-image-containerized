<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8">
  <title>The Sparkling Ponies Ride At Midnight!</title>
</head>
<body>
  <h1>DND Forum</h1>

  <!-- Thread Creation Form -->
  <h2>Create a Thread</h2>
  <form id="thread-form">
    <input type="text" id="thread-title" placeholder="Thread Title" required />
    <input type="text" id="thread-author" placeholder="Your Name" required />
    <textarea id="thread-message" placeholder="First Message" required></textarea>
    <button type="submit">Create Thread</button>
  </form>

  <!-- List of Threads -->
  <h2>All Threads</h2>
  <ul id="thread-list"></ul>

  <!-- Single Thread View -->
  <div id="thread-view" style="display:none;">
    <h2 id="thread-title-view"></h2>
    <ul id="message-list"></ul>

    <h3>Post a Reply</h3>
    <form id="reply-form">
      <input type="text" id="reply-author" placeholder="Your Name" required />
      <textarea id="reply-message" placeholder="Your message" required></textarea>
      <button type="submit">Send</button>
    </form>
  </div>

  <script>
    const threadList = document.getElementById('thread-list');
    const threadView = document.getElementById('thread-view');
    const threadTitleView = document.getElementById('thread-title-view');
    const messageList = document.getElementById('message-list');
    let currentThreadId = null;

    async function fetchThreads() {
      const res = await fetch('/threads');
      const threads = await res.json();
      threadList.innerHTML = '';
      threads.forEach(thread => {
        const li = document.createElement('li');
        li.textContent = thread.title;
        li.style.cursor = 'pointer';
        li.onclick = () => loadThread(thread.id, thread.title);
        threadList.appendChild(li);
      });
    }

    async function loadThread(id, title) {
      currentThreadId = id;
      threadTitleView.textContent = title;
      threadView.style.display = 'block';
      const res = await fetch(`/threads/${id}`);
      const data = await res.json();
      messageList.innerHTML = '';
      data.messages.forEach(msg => {
        const li = document.createElement('li');
        li.textContent = `${msg.author}: ${msg.message}`;
        messageList.appendChild(li);
      });
    }

    document.getElementById('thread-form').onsubmit = async (e) => {
      e.preventDefault();
      const title = document.getElementById('thread-title').value;
      const author = document.getElementById('thread-author').value;
      const message = document.getElementById('thread-message').value;

      const res = await fetch('/threads', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, author, message })
      });

      if (res.ok) {
        document.getElementById('thread-form').reset();
        fetchThreads();
      }
    };

    document.getElementById('reply-form').onsubmit = async (e) => {
      e.preventDefault();
      const author = document.getElementById('reply-author').value;
      const message = document.getElementById('reply-message').value;

      await fetch(`/threads/${currentThreadId}/messages`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ author, message })
      });

      document.getElementById('reply-form').reset();
      loadThread(currentThreadId, threadTitleView.textContent);
    };

    fetchThreads();

  const token = localStorage.getItem('token');
  if (!token) {
    window.location.href = '/login';
  }

  fetch('/threads', {
    headers: {
      'Authorization': `Bearer ${token}`
      'Content-Type': 'application/json'
    }
  }).then(res => res.json()).then(data => {
    // Do something with data
  });
  </script>
</body>
</html>
